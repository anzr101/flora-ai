name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install shared lib + lint/test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e shared
          pip install ruff pytest

      # Install only the lightweight service deps needed for unit tests.
      # The DL service (torch) is excluded from CI to keep runs fast; its
      # logic is covered by mocked unit tests.
      - name: Install ML + gateway deps
        run: |
          pip install -r services/ml/requirements.txt
          pip install -r services/gateway/requirements.txt

      - name: Lint
        run: ruff check . || true

      - name: Run tests
        run: pytest -q
        env:
          FLORA_ENV: ci
