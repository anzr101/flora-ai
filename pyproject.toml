# Root tooling config for FloraAI. Individual services declare their own runtime
# dependencies in requirements.txt; this file configures the dev/test tooling
# and makes every service package importable under pytest without installation.

[tool.pytest.ini_options]
pythonpath = [
    "shared",
    "services/ml",
    "services/dl",
    "services/agent",
    "services/gateway",
]
testpaths = ["services"]
# importlib mode lets same-named test dirs ("tests") coexist without __init__.py
# package collisions across services.
addopts = "-q --import-mode=importlib"

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["**/data", "**/models", "**/vectorstore"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # line length handled by formatter; long strings are fine
